<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新澳門雲端大數據分析中心 | 身份核驗</title>
    <style>
        :root {
            --primary-blue: #004d99;
            --bg-main: #f4f7f6;
            --white: #ffffff;
            --border-color: #d1d9e6;
            --text-dark: #2c3e50;
            --error-red: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-dark); 
            font-family: 'Helvetica Neue', Arial, 'PingFang HK', 'Microsoft JhengHei', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            padding: 40px;
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: var(--primary-blue);
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 1.25em;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-blue);
        }

        .header-subtitle {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            color: #34495e;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1em;
            outline: none;
            transition: 0.2s;
            background: #fafafa;
            letter-spacing: 2px;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--primary-blue);
            background: #fff;
            box-shadow: 0 0 5px rgba(0,77,153,0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background: #003366;
        }

        #errorMessage {
            margin-top: 15px;
            font-size: 0.85em;
            color: var(--error-red);
            display: none;
        }

        .footer-info {
            margin-top: 30px;
            font-size: 0.75em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <svg fill="white" width="30" height="30" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 4.5l7 14H5l7-14z"/></svg>
        </div>
        <div class="header-title">數據中心終端訪問</div>
        <div class="header-subtitle">MACAU DATA CENTER TERMINAL ACCESS</div>

        <div class="input-group">
            <label class="input-label">請輸入授權查看碼：</label>
            <input type="text" id="authInput" maxlength="32">
        </div>
        <button class="btn-submit" onclick="verifyAuth()">驗證身份并進入</button>
        
        <div id="errorMessage">⚠ 授權代碼錯誤或無效，請聯繫配給員。</div>

        <div class="footer-info">
            安全等級：LEVEL 4 (INDUSTRIAL)<br>
            您的訪問 IP 已被記錄，請遵守保密協議。
        </div>
    </div>

    <script>

async function verifyAuth() {
    const userInput = document.getElementById('authInput').value.trim();
    const errorMsg = document.getElementById('errorMessage');
    const authInput = document.getElementById('authInput');
    try {
        const response = await fetch('config.json');
        const data = await response.json();
        
        if (data.auth_codes.includes(userInput)) {
            sessionStorage.setItem('macau_auth', userInput);
            errorMsg.style.display = 'none';
            window.location.href = "/mains.htm";
        } else {
            errorMsg.style.display = 'block';
            authInput.style.borderColor = 'var(--error-red)';
            authInput.focus();
        }
    } catch (error) {}
}

document.getElementById('authInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        verifyAuth();
    }
});

    </script>
</body>
</html>
